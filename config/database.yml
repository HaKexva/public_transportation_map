# PostgreSQL. Install locally (macOS: brew install postgresql@16).
# Set DATABASE_URL or DB_HOST / DB_USERNAME / DB_PASSWORD / DB_NAME as needed.
#
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DB_HOST", "localhost") %>
  port: <%= ENV.fetch("DB_PORT", "5432") %>
  username: <%= ENV.fetch("DB_USERNAME", ENV.fetch("USER", "postgres")) %>
  password: <%= ENV["DB_PASSWORD"] %>

development:
  <<: *default
  database: <%= ENV.fetch("DB_NAME", "public_transportation_map_development") %>
  url: <%= ENV["DATABASE_URL"] %>

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: <%= ENV.fetch("DB_NAME", "public_transportation_map_test") %>
  url: <%= ENV["DATABASE_URL"] %>

# Production uses DATABASE_URL from the host (Railway, Render, etc.).
# Cache, queue, and cable share the same database by default; override with
# CACHE_DATABASE_URL, QUEUE_DATABASE_URL, or CABLE_DATABASE_URL if needed.
production:
  primary: &primary
    <<: *default
    database: <%= ENV.fetch("DB_NAME", "public_transportation_map_production") %>
    url: <%= ENV["DATABASE_URL"] %>
  cache:
    <<: *primary
    url: <%= ENV.fetch("CACHE_DATABASE_URL", ENV["DATABASE_URL"]) %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary
    url: <%= ENV.fetch("QUEUE_DATABASE_URL", ENV["DATABASE_URL"]) %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary
    url: <%= ENV.fetch("CABLE_DATABASE_URL", ENV["DATABASE_URL"]) %>
    migrations_paths: db/cable_migrate
